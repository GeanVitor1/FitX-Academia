version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fitx-sqlserver
    environment:
      SA_PASSWORD: "FitX@2026!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "FitX@2026!" -Q "SELECT 1" -C
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fitx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitx-api
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=FitXDb;User Id=sa;Password=FitX@2026!;TrustServerCertificate=True
      - ConnectionStrings__Redis=localhost:6379
      - Jwt__Secret=fitx-super-secret-key-2026-must-be-at-least-32-characters
      - Jwt__ExpirationInMinutes=60
      - Jwt__RefreshExpirationInDays=7

  web:
    build:
      context: ./src/fitx-web
      dockerfile: Dockerfile
    container_name: fitx-web
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  sqlserver-data:
  redis-data:
